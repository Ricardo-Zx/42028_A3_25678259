<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>{% block title %}Smart Checkout{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      min-height: 100vh;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Topbar ── */
    .topbar {
      background: linear-gradient(135deg, #1e3a5f 0%, #1a4d6b 55%, #1d6185 100%);
      color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 56px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.15);
      border-radius: 9px; border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
    }
    .topbar h1 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: -0.2px; }
    .topbar-right { display: flex; gap: 8px; align-items: center; }
    .top-btn {
      text-decoration: none;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.92);
      padding: 6px 13px;
      border-radius: 8px;
      font-size: 12.5px; font-weight: 500;
      border: 1px solid rgba(255,255,255,0.14);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: inline-flex; align-items: center; gap: 5px;
      white-space: nowrap;
    }
    .top-btn:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.25); }
    .badge {
      background: rgba(255,255,255,0.16);
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    }

    /* ── Wrap ── */
    .wrap { max-width: 1240px; margin: 24px auto; padding: 0 28px 56px; }

    /* ── Status badge ── */
    .status-badge {
      display: inline-block; padding: 3px 9px; border-radius: 999px;
      background: #dbeafe; color: #1d4ed8;
      font-size: 11px; font-weight: 600; letter-spacing: 0.2px;
    }

    /* ── Notice ── */
    .notice {
      background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534;
      padding: 11px 16px; border-radius: 12px; margin-bottom: 18px; font-size: 13px;
    }
    .muted { color: #64748b; }

    /* ── Panel ── */
    .panel {
      background: #fff; border-radius: 16px; padding: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.05);
      border: 1px solid #f0f4f8;
    }

    /* ── Stats row ── */
    .stats-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat {
      background: #fff; border-radius: 14px; padding: 16px 20px;
      flex: 1; min-width: 120px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.05);
      border: 1px solid #f0f4f8;
    }
    .stat-label {
      font-size: 10.5px; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.7px; font-weight: 700;
    }
    .stat-value {
      font-size: 28px; font-weight: 800; margin-top: 4px;
      color: #1a4d6b; letter-spacing: -1px;
    }

    /* ── Image grid ── */
    .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .panel h2 {
      font-size: 10.5px; font-weight: 700; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.7px; margin: 0 0 12px;
    }
    .panel img {
      width: 100%; border-radius: 10px; display: block;
      object-fit: contain; max-height: 480px; background: #f8fafc;
    }

    /* ── Bottom grid ── */
    .bottom-grid { display: grid; grid-template-columns: 1fr 360px; gap: 16px; align-items: start; }

    /* ── Table panel ── */
    .table-panel {
      background: #fff; border-radius: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.05);
      border: 1px solid #f0f4f8; overflow: hidden;
    }
    .table-header {
      padding: 15px 20px 11px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      border-bottom: 1px solid #f1f5f9;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #f8fafc; }
    th, td {
      padding: 10px 16px; font-size: 13px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle; text-align: left;
    }
    th { font-size: 10.5px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafcff; }

    /* ── Quantity input ── */
    .qty-input {
      width: 68px; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 7px 9px; font-size: 13px; font-family: inherit;
      background: #f8fafc; transition: border-color 0.15s, background 0.15s;
    }
    .qty-input:focus { outline: none; border-color: #1a4d6b; background: #fff; }

    /* ── Inline buttons ── */
    .inline-btn {
      background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 7px;
      padding: 5px 11px; cursor: pointer; font-size: 12px; font-weight: 600;
      color: #475569; font-family: inherit; transition: all 0.15s;
    }
    .inline-btn:hover { background: #e8edf2; }
    .danger-btn { background: #fff1f2; border-color: #fecdd3; color: #be123c; }
    .danger-btn:hover { background: #ffe4e6; border-color: #fda4af; }

    /* ── Action bar ── */
    .action-bar { display: flex; gap: 10px; padding: 14px 20px 18px; flex-wrap: wrap; }

    /* ── Buttons ── */
    .primary-btn {
      background: linear-gradient(135deg, #1e3a5f, #1a4d6b);
      color: #fff; border: none; border-radius: 10px;
      padding: 10px 18px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 2px 8px rgba(26,77,107,0.28);
      transition: all 0.15s;
    }
    .primary-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(26,77,107,0.32); }
    .secondary-btn {
      background: #fff; color: #1a4d6b; border: 1px solid #cbd5e1;
      border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .secondary-btn:hover { background: #f8fafc; border-color: #94a3b8; }

    /* ── Chart panel ── */
    .chart-panel {
      background: #fff; border-radius: 16px; padding: 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.05);
      border: 1px solid #f0f4f8;
    }

    /* ── Form row / field ── */
    .form-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .field {
      border: 1px solid #e2e8f0; border-radius: 10px; padding: 9px 12px;
      font-size: 13px; min-width: 180px; font-family: inherit;
      background: #f8fafc; transition: border-color 0.15s, background 0.15s;
    }
    .field:focus { outline: none; border-color: #1a4d6b; background: #fff; }

    /* ── List panel ── */
    .list-panel {
      background: #fff; border-radius: 16px; overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.05);
      border: 1px solid #f0f4f8;
    }
    .list-item {
      display: grid; gap: 12px; padding: 13px 20px;
      border-bottom: 1px solid #f1f5f9; align-items: center;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item.header {
      background: #f8fafc; font-size: 10.5px; font-weight: 700;
      color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .list-item:not(.header):hover { background: #fafcff; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .img-grid, .bottom-grid { grid-template-columns: 1fr; }
      .list-item { grid-template-columns: 1fr !important; }
      .topbar { padding: 0 16px; }
      .wrap { padding: 0 14px 40px; }
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-box {
      background: #fff; border-radius: 22px;
      padding: 30px 30px 26px; max-width: 400px; width: calc(100% - 40px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.05);
      transform: scale(0.88) translateY(16px);
      transition: transform 0.25s cubic-bezier(0.34, 1.42, 0.64, 1);
    }
    .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }
    .modal-icon-wrap {
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px; flex-shrink: 0;
    }
    .modal-icon-wrap.danger { background: #fff1f2; }
    .modal-icon-wrap.primary { background: #eff6ff; }
    .modal-title { font-size: 17px; font-weight: 700; color: #0f172a; margin-bottom: 8px; line-height: 1.3; }
    .modal-msg { font-size: 13.5px; color: #64748b; line-height: 1.65; margin-bottom: 24px; }
    .modal-msg strong { color: #0f172a; font-weight: 600; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-cancel {
      background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0;
      border-radius: 10px; padding: 9px 16px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .modal-cancel:hover { background: #e8edf2; }
    .modal-ok {
      color: #fff; border: none; border-radius: 10px;
      padding: 9px 18px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .modal-ok.danger {
      background: linear-gradient(135deg, #b91c1c, #dc2626);
      box-shadow: 0 2px 8px rgba(185,28,28,0.3);
    }
    .modal-ok.primary {
      background: linear-gradient(135deg, #1e3a5f, #1a4d6b);
      box-shadow: 0 2px 8px rgba(26,77,107,0.28);
    }
    .modal-ok:hover { opacity: 0.9; transform: translateY(-1px); }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    </div>
    <h1>{% block page_title %}Smart Checkout{% endblock %}</h1>
    {% block page_badge %}{% endblock %}
  </div>
  <div class="topbar-right">
    <a class="top-btn" href="{% url 'home' %}">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Session
    </a>
    <a class="top-btn" href="{% url 'history' %}">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      History
    </a>
    {% block top_actions %}{% endblock %}
  </div>
</div>

<div class="wrap">
  {% if message %}
  <div class="notice">{{ message }}</div>
  {% endif %}
  {% block content %}{% endblock %}
</div>

<!-- ── Global animated modal ── -->
<div class="modal-overlay" id="app-modal" onclick="AppModal._bgClick(event)">
  <div class="modal-box">
    <div class="modal-icon-wrap danger" id="modal-icon-wrap"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="AppModal.close()">Cancel</button>
      <button class="modal-ok danger" id="modal-ok-btn">Confirm</button>
    </div>
  </div>
</div>

<script>
const _MI = {
  danger: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  primary: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a4d6b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
};
const AppModal = {
  _cb: null,
  show({ iconVariant = 'danger', title, message, confirmText = 'Confirm', confirmVariant = 'danger', onConfirm }) {
    this._cb = onConfirm;
    const wrap = document.getElementById('modal-icon-wrap');
    wrap.className = 'modal-icon-wrap ' + iconVariant;
    wrap.innerHTML = _MI[iconVariant] || _MI.danger;
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-msg').innerHTML = message;
    const btn = document.getElementById('modal-ok-btn');
    btn.textContent = confirmText;
    btn.className = 'modal-ok ' + confirmVariant;
    btn.onclick = () => { this.close(); if (this._cb) this._cb(); };
    document.getElementById('app-modal').classList.add('active');
  },
  close() { document.getElementById('app-modal').classList.remove('active'); },
  _bgClick(e) { if (e.target === document.getElementById('app-modal')) this.close(); }
};
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
